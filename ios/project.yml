name: SaveMoney
options:
  bundleIdPrefix: com.savemoney
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  swift: "6.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    MARKETING_VERSION: 1.0.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: ""

targets:
  SaveMoney:
    type: application
    platform: iOS
    sources:
      - path: SaveMoney
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.savemoney.app
        INFOPLIST_FILE: SaveMoney/Resources/Info.plist
        ENABLE_PREVIEWS: YES
    dependencies: []
